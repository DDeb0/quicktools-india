<!DOCTYPE html>
<html>
<head>
<title>CAGR Calculator</title>

<style>
body{font-family:Arial;text-align:center;padding:40px;background:#fafafa;}
.box{background:white;padding:20px;max-width:300px;margin:auto;border-radius:10px;}
input{width:90%;padding:8px;margin:5px;}
button{padding:8px 15px;background:#2b7cff;color:white;border:none;border-radius:5px;}
</style>
</head>

<body>

<h1>CAGR Calculator</h1>

<div class="box">

<input type="number" id="start" placeholder="Initial Value"><br>
<input type="number" id="end" placeholder="Final Value"><br>
<input type="number" id="years" placeholder="Years"><br>

<button onclick="calcCAGR()">Calculate</button>

<p id="result"></p>

</div>

<script>
function calcCAGR(){
let start = document.getElementById("start").value;
let end = document.getElementById("end").value;
let years = document.getElementById("years").value;

let cagr = (Math.pow(end/start,1/years)-1)*100;

document.getElementById("result").innerText =
"CAGR: " + cagr.toFixed(2) + "%";
}
</script>

</body>
</html>
