<!DOCTYPE html>
<html>
<head>
<title>Currency Converter</title>

<style>
body{font-family:Arial;text-align:center;padding:40px;background:#fafafa;}
.box{background:white;padding:20px;max-width:300px;margin:auto;border-radius:10px;}
input{width:90%;padding:8px;margin:5px;}
button{padding:8px 15px;background:#2b7cff;color:white;border:none;border-radius:5px;}
</style>
</head>

<body>

<h1>Currency Converter (USD → INR)</h1>

<div class="box">

<input type="number" id="usd" placeholder="USD"><br>

<button onclick="convert()">Convert</button>

<p id="result"></p>

</div>

<script>
function convert(){
let usd = document.getElementById("usd").value;

// Approx rate (can update later)
let rate = 83;

let inr = usd * rate;

document.getElementById("result").innerText =
"INR: ₹ " + inr;
}
</script>

</body>
</html>
