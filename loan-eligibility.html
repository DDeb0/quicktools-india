<!DOCTYPE html>
<html>
<head>
<title>Loan Eligibility Calculator – Check Loan Amount</title>

<meta name="description" content="Check how much loan you are eligible for based on your salary.">

<style>
body{
font-family:Arial;
background:#fafafa;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:20px;
max-width:300px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
background:#2b7cff;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<h1>Loan Eligibility Calculator</h1>

<div class="box">

<input type="number" id="salary" placeholder="Monthly Salary (₹)"><br>
<input type="number" id="ratio" placeholder="Eligible % (e.g. 40)"><br>

<button onclick="calcLoan()">Calculate</button>

<p id="result"></p>

</div>

<script>
function calcLoan(){
let salary = document.getElementById("salary").value;
let ratio = document.getElementById("ratio").value;

let loan = salary * ratio;

document.getElementById("result").innerText =
"Eligible Loan Amount: ₹ " + loan;
}
</script>

</body>
</html>
