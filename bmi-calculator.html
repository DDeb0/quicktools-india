<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator – Check Your Body Mass Index</title>

<meta name="description" content="Free BMI calculator to check your body mass index instantly.">

<style>
body{
font-family:Arial;
background:#fafafa;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:20px;
max-width:300px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
background:#2b7cff;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<h1>BMI Calculator</h1>

<div class="box">

<input type="number" id="weight" placeholder="Weight (kg)"><br>
<input type="number" id="height" placeholder="Height (cm)"><br>

<button onclick="calcBMI()">Calculate</button>

<p id="result"></p>

</div>

<script>
function calcBMI(){
let weight = document.getElementById("weight").value;
let height = document.getElementById("height").value / 100;

let bmi = weight / (height * height);

document.getElementById("result").innerText =
"Your BMI: " + bmi.toFixed(2);
}
</script>

</body>
</html>
