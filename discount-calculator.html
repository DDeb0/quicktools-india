<!DOCTYPE html>
<html>
<head>
<title>Discount Calculator – Find Final Price Easily</title>

<meta name="description" content="Calculate discount and final price instantly with this free calculator.">

<style>
body{
font-family:Arial;
background:#fafafa;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:20px;
max-width:300px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
background:#2b7cff;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<h1>Discount Calculator</h1>

<div class="box">

<input type="number" id="price" placeholder="Original Price (₹)"><br>
<input type="number" id="discount" placeholder="Discount %"><br>

<button onclick="calcDiscount()">Calculate</button>

<p id="result"></p>

</div>

<script>
function calcDiscount(){
let price = document.getElementById("price").value;
let discount = document.getElementById("discount").value;

let saved = price * discount / 100;
let final = price - saved;

document.getElementById("result").innerText =
"You save ₹" + saved + " | Final price ₹" + final;
}
</script>

</body>
</html>
