<!DOCTYPE html>
<html>
<head>
<title>Simple Interest Calculator</title>

<style>
body{font-family:Arial;text-align:center;padding:40px;background:#fafafa;}
.box{background:white;padding:20px;max-width:300px;margin:auto;border-radius:10px;}
input{width:90%;padding:8px;margin:5px;}
button{padding:8px 15px;background:#2b7cff;color:white;border:none;border-radius:5px;}
</style>
</head>

<body>

<h1>Simple Interest Calculator</h1>

<div class="box">

<input type="number" id="p" placeholder="Principal (₹)"><br>
<input type="number" id="r" placeholder="Rate (%)"><br>
<input type="number" id="t" placeholder="Time (years)"><br>

<button onclick="calcSI()">Calculate</button>

<p id="result"></p>

</div>

<script>
function calcSI(){
let p = document.getElementById("p").value;
let r = document.getElementById("r").value;
let t = document.getElementById("t").value;

let si = (p*r*t)/100;

document.getElementById("result").innerText =
"Simple Interest: ₹ " + si;
}
</script>

</body>
</html>
