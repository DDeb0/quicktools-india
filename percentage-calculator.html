<!DOCTYPE html>
<html>
<head>
<title>Percentage Calculator</title>

<style>
body{font-family:Arial;text-align:center;padding:40px;background:#fafafa;}
.box{background:white;padding:20px;max-width:300px;margin:auto;border-radius:10px;}
input{width:90%;padding:8px;margin:5px;}
button{padding:8px 15px;background:#2b7cff;color:white;border:none;border-radius:5px;}
</style>
</head>

<body>

<h1>Percentage Calculator</h1>

<div class="box">

<input type="number" id="percent" placeholder="Percentage"><br>
<input type="number" id="number" placeholder="Number"><br>

<button onclick="calcPercent()">Calculate</button>

<p id="result"></p>

</div>

<script>
function calcPercent(){
let percent = document.getElementById("percent").value;
let number = document.getElementById("number").value;

let result = number * percent / 100;

document.getElementById("result").innerText =
"Result: " + result;
}
</script>

</body>
</html>
