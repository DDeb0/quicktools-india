<!DOCTYPE html>
<html>
<head>
<title>GST Calculator India – Calculate GST Easily</title>

<meta name="description" content="Calculate EMI easily with our free EMI calculator.">

<style>
body{
font-family:Arial;
background:#fafafa;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:20px;
max-width:300px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
background:#2b7cff;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<h1>GST Calculator</h1>

<div class="box">

<input type="number" id="amount" placeholder="Amount"><br>
<input type="number" id="gst" placeholder="GST %"><br>

<button onclick="calcGST()">Calculate</button>

<p id="result"></p>
  
</div>

<script>
function calcGST(){
let amount = document.getElementById("amount").value;
let gst = document.getElementById("gst").value;

let gstAmount = amount * gst / 100;
let total = parseFloat(amount) + gstAmount;

document.getElementById("result").innerText =
"GST: ₹" + gstAmount.toFixed(2) + " | Total: ₹" + total.toFixed(2);
}
</script>

</body>
</html>
