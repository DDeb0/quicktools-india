<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator India</title>

<meta name="description" content="Calculate EMI easily with our free EMI calculator.">

<style>
body{
font-family:Arial;
background:#fafafa;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:20px;
max-width:300px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
background:#2b7cff;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<h1>EMI Calculator</h1>

<div class="box">

<input type="number" id="loan" placeholder="Loan Amount"><br>

<input type="number" id="rate" placeholder="Interest Rate"><br>

<input type="number" id="months" placeholder="Months"><br>

<button onclick="calc()">Calculate</button>

<p id="result"></p>

</div>

<script>
function calc(){
let loan = document.getElementById("loan").value;
let rate = document.getElementById("rate").value / 1200;
let months = document.getElementById("months").value;

let emi = loan * rate * Math.pow((1 + rate), months) /
((Math.pow((1 + rate), months)) - 1);

document.getElementById("result").innerText =
"EMI: ₹ " + emi.toFixed(2);
}
</script>

</body>
</html>
